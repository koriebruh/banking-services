services:
  # -----------------------------------------------------------------------
  # APPLICATION SERVICE
  # -----------------------------------------------------------------------
  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auth-service
    restart: unless-stopped
    ports:
      - "8081:8081"
    env_file:
      - .env                         # ← otomatis load semua variable dari .env
    environment:
      SPRING_R2DBC_PASSWORD: ${DB_PASSWORD}
      SPRING_FLYWAY_PASSWORD: ${DB_PASSWORD}
      APP_JWT_SECRET: ${JWT_SECRET}
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      auth-postgres:
        condition: service_healthy
      auth-redis:
        condition: service_healthy
      auth-mailhog:
        condition: service_started
    networks:
      - auth-network
      - shared-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8081/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # -----------------------------------------------------------------------
  # POSTGRESQL
  # -----------------------------------------------------------------------
  auth-postgres:
    image: postgres:16-alpine
    container_name: auth-postgres
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    env_file:
      - .env
    networks:
      - auth-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U auth_user -d auth_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # -----------------------------------------------------------------------
  # REDIS
  # -----------------------------------------------------------------------
  auth-redis:
    image: redis:7-alpine
    container_name: auth-redis
    restart: unless-stopped
    ports:
      - "6379"
    env_file:
      - .env
    networks:
      - auth-network
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------------------
  # MAILHOG (SMTP TESTING)
  # -----------------------------------------------------------------------
  auth-mailhog:
    container_name: auth-mailhog
    networks:
      - auth-network
    image: mailhog/mailhog
    ports:
      - "1025:1025"  # SMTP port
      - "8025:8025"  # Web UI untuk lihat email

  # -------------------
  # VOLUMES & NETWORKS
  # -------------------
volumes:
  postgres_data:
  redis_data:

networks:
  auth-network:
    name: auth-network
    driver: bridge
  shared-network:
    external: true  # ← join network yang sudah ada