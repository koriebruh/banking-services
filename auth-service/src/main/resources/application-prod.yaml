server:
  port: 8081
  netty:
    connection-timeout: 10s
    idle-timeout: 60s

spring:
  application:
    name: auth-service

  jackson:
    property-naming-strategy: SNAKE_CASE

  mail:
    host: auth-mailhog
    port: 1025
    #    USAGE FOR PRODUCTION (e.g., Gmail SMTP):
    #    username: your_email@gmail.com
    #    password: your_app_password
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

  r2dbc:
    url: r2dbc:postgresql://auth-postgres:5432/auth_db
    username: auth_user
    password: ${DB_PASSWORD}
    pool:
      initial-size: 5
      max-size: 20
      max-idle-time: 30m
      validation-query: SELECT 1

  flyway:
    url: jdbc:postgresql://auth-postgres:5432/auth_db
    user: auth_user
    password: ${DB_PASSWORD}
    locations: classpath:db/migration
    baseline-on-migrate: true
    enabled: true
    repair-on-migrate: true

  data:
    redis:
      host: auth-redis
      port: 6379
      password: ${REDIS_PASSWORD}
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 2
          max-wait: 1000ms

  kafka:
    bootstrap-servers: kafka:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
      properties:
        max.in.flight.requests.per.connection: 1
        enable.idempotence: true

logging:
  level:
    root: WARN
    com.koriebruh.authservice: INFO
    org.springframework: WARN
    io.r2dbc: WARN


# CUSTOM CONFIGURATION
app:
  # SECURITY CONFIGURATION
  jwt:
    secret: ${JWT_SECRET}
    mfa-token-expiration: 300000        # 5 minutes (5 * 60 * 1000)
    access-token-expiration: 900000     # 15 minutes (15 * 60 * 1000)
    refresh-token-expiration: 604800000 # 7 days (7 * 24 * 60 * 60 * 1000)
  version: v1

  # CUSTOM
  kafka:
    topic:
      auth-events: auth.events
    event:
      version: v1

  # RATE LIMITING CONFIGURATION FOR AUTHENTICATION ENDPOINTS
  rate-limit:
    endpoints:
      login:
        max-requests: 5
        window-seconds: 60
      register:
        max-requests: 3
        window-seconds: 3600
      verify-email:
        max-requests: 5
        window-seconds: 60
      resend-verification:
        max-requests: 3
        window-seconds: 3600
      forgot-password:
        max-requests: 3
        window-seconds: 3600
      reset-password:
        max-requests: 5
        window-seconds: 60
      mfa-validate:
        max-requests: 5
        window-seconds: 60
      refresh:
        max-requests: 10
        window-seconds: 60

# CONFIGURATION FOR SPRINGDOC OPENAPI (SWAGGER) DOCUMENTATION, real prod matikan
springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true


# CONFIGURATION FOR ACTUATOR METRICS AND HEALTH CHECKS
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      show-components: when-authorized
  info:
    env:
      enabled: false